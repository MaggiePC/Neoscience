<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="g" cx="30%" cy="20%" r="120%">
      <stop offset="0" stop-color="#4FA3FF"></stop>
      <stop offset="0.55" stop-color="#6B5CFF"></stop>
      <stop offset="1" stop-color="#8B2FFF"></stop>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"></feGaussianBlur>
    </filter>
  </defs>

  <!-- disco -->
  <circle cx="256" cy="256" r="236" fill="url(#g)"></circle>
  <circle cx="256" cy="256" r="236" fill="url(#g)" opacity="0.15" filter="url(#soft)"></circle>

  <!-- anillos tipo átomo -->
  <g stroke="white" stroke-opacity="0.9" stroke-width="10" fill="none">
    <ellipse cx="256" cy="256" rx="140" ry="228"></ellipse>
    <g transform="rotate(60 256 256)">
      <ellipse cx="256" cy="256" rx="140" ry="228"></ellipse>
    </g>
    <g transform="rotate(120 256 256)">
      <ellipse cx="256" cy="256" rx="140" ry="228"></ellipse>
    </g>
  </g>

  <!-- núcleo -->
  <circle cx="256" cy="256" r="52" fill="rgba(0,0,0,0.18)" stroke="white" stroke-width="10"></circle>

  <!-- monograma NS -->
  <text x="256" y="266" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="44" font-weight="800" fill="#FFFFFF">
    NS
  </text>
</svg>
